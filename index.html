<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <title>Title</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body data-bs-theme="dark">
    <div class="container py-5">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card mb-4">
            <div class="card-header bg-primary text-white">
              <h5 id="title" class="mb-0 pe-none">Registrazione Utente</h5>
            </div>
            <div class="card-body text-center d-block">
              <h4 class="mb-4 d-none user-welcome">
                Benvenuto,
                <span id="display-name" class="text-primary ms-2">Ospite</span>
              </h4>

              <div class="input-group my-3 user-welcome d-flex">
                <input
                  type="text"
                  id="user-name"
                  class="form-control"
                  placeholder="Inserisci il tuo nome"
                />
                <button class="btn btn-success" onclick="saveName()">
                  Salva
                </button>
              </div>
              <button
                class="btn btn-danger d-none user-welcome"
                onclick="removeName()"
              >
                Rimuovi
              </button>
            </div>
          </div>

          <div class="card pe-none">
            <div class="card-body text-center">
              <h6 class="text-muted text-uppercase small">
                Sessione attiva da
              </h6>
              <div class="display-4 mt-2">
                <span id="timer" class="fw-bold">0</span>
                <small class="fs-6 text-muted">secondi</small>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
    <script src="./scripts/script.js"></script>
  </body>
</html>
